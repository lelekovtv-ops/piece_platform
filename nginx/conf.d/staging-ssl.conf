# piece — Nginx Staging Config (SSL via Let's Encrypt)
# Domain: staging.piece-app.com

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=img_limit:10m rate=200r/s;

# --- Cookie-based staging gate ---
map $cookie_staging_auth $staging_auth_ok {
    "${STAGING_GATE_TOKEN}" 1;
    default 0;
}

# --- HTTP -> HTTPS redirect + ACME challenge ---
server {
    listen 80;
    server_name staging.piece-app.com piece-app.com piece-staging.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://staging.piece-app.com$request_uri;
    }
}

# --- HTTPS server ---
server {
    listen 443 ssl;
    http2 on;
    server_name staging.piece-app.com;

    ssl_certificate /etc/letsencrypt/live/staging.piece-app.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.piece-app.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 50m;

    # --- Staging gate login page (no auth needed) ---
    location = /gate {
        root /usr/share/nginx/html;
        try_files /gate.html =404;
    }

    # --- Backend API (no gate — frontend JS needs it) ---
    location /api/ {
        rewrite ^/api/(.*) /$1 break;

        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://api-gateway:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_buffering off;
    }

    # --- WebSocket (Socket.IO) ---
    location /socket.io/ {
        proxy_pass http://websocket-gateway:3109;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # --- Image processing (imagorvideo) ---
    location /img/ {
        limit_req zone=img_limit burst=100 nodelay;

        proxy_pass http://imagorvideo:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept $http_accept;
        proxy_read_timeout 30;
        proxy_buffering on;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Static storage (direct MinIO access) ---
    location /storage/koza-uploads/ {
        rewrite ^/storage/koza-uploads/(.*) /koza-uploads/$1 break;

        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline'; sandbox" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # --- Grafana (monitoring dashboard, has own auth) ---
    location /grafana/ {
        proxy_pass http://grafana:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Root redirect to landing ---
    location = / {
        if ($staging_auth_ok = 0) {
            return 302 /gate;
        }
        return 302 /home;
    }

    # --- Frontend (catch-all, gate-protected) ---
    location / {
        if ($staging_auth_ok = 0) {
            return 302 /gate;
        }

        proxy_pass http://platform:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static assets caching ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://platform:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
