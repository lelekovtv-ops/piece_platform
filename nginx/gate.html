<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIECE — Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050508;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        color: #e4e4e7;
      }

      /* Aurora background */
      .aurora {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }

      .aurora::before,
      .aurora::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.35;
        animation: float 12s ease-in-out infinite alternate;
      }

      .aurora::before {
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
        top: -15%;
        left: -10%;
        animation-delay: 0s;
      }

      .aurora::after {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, #2563eb 0%, transparent 70%);
        bottom: -20%;
        right: -10%;
        animation-delay: -4s;
      }

      .aurora-extra {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.2;
        background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: float2 15s ease-in-out infinite alternate;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(80px, 40px) scale(1.15);
        }
      }

      @keyframes float2 {
        0% {
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
        }
        100% {
          transform: translate(-30%, -60%) scale(1.2) rotate(20deg);
        }
      }

      /* Grid overlay */
      .grid-overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(
          ellipse 60% 60% at 50% 50%,
          black,
          transparent
        );
      }

      /* Floating particles */
      .particles {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: rgba(124, 58, 237, 0.6);
        border-radius: 50%;
        animation: rise linear infinite;
      }

      .particle:nth-child(1) {
        left: 10%;
        animation-duration: 12s;
        animation-delay: 0s;
      }
      .particle:nth-child(2) {
        left: 25%;
        animation-duration: 15s;
        animation-delay: -3s;
        width: 2px;
        height: 2px;
        background: rgba(37, 99, 235, 0.5);
      }
      .particle:nth-child(3) {
        left: 40%;
        animation-duration: 10s;
        animation-delay: -6s;
      }
      .particle:nth-child(4) {
        left: 55%;
        animation-duration: 18s;
        animation-delay: -2s;
        width: 2px;
        height: 2px;
        background: rgba(6, 182, 212, 0.4);
      }
      .particle:nth-child(5) {
        left: 70%;
        animation-duration: 14s;
        animation-delay: -5s;
      }
      .particle:nth-child(6) {
        left: 85%;
        animation-duration: 11s;
        animation-delay: -8s;
        width: 2px;
        height: 2px;
        background: rgba(124, 58, 237, 0.4);
      }
      .particle:nth-child(7) {
        left: 15%;
        animation-duration: 16s;
        animation-delay: -1s;
        background: rgba(37, 99, 235, 0.4);
      }
      .particle:nth-child(8) {
        left: 60%;
        animation-duration: 13s;
        animation-delay: -7s;
        width: 2px;
        height: 2px;
      }

      @keyframes rise {
        0% {
          bottom: -5%;
          opacity: 0;
          transform: translateX(0);
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          bottom: 105%;
          opacity: 0;
          transform: translateX(30px);
        }
      }

      /* Card */
      .card {
        position: relative;
        z-index: 10;
        width: 400px;
        max-width: 90vw;
        padding: 48px 40px;
        background: rgba(15, 15, 20, 0.75);
        border: 1px solid rgba(124, 58, 237, 0.15);
        border-radius: 24px;
        backdrop-filter: blur(40px) saturate(1.5);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03),
          0 25px 50px rgba(0, 0, 0, 0.5),
          0 0 100px rgba(124, 58, 237, 0.05);
        animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Logo */
      .logo {
        text-align: center;
        margin-bottom: 8px;
      }

      .logo-text {
        font-family: "Libre Baskerville", Georgia, serif;
        font-style: italic;
        font-size: 64px;
        font-weight: 400;
        letter-spacing: 12px;
        color: #e8e4d9;
        text-indent: 12px;
      }

      .logo-rule {
        width: 200px;
        height: 1px;
        background: #3d3d3a;
        margin: 14px auto 16px;
        border: none;
      }

      .subtitle {
        text-align: center;
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: 9px;
        color: #5f5e5a;
        letter-spacing: 7px;
        text-transform: uppercase;
        margin-bottom: 36px;
        font-weight: 400;
        text-indent: 7px;
      }

      /* Form */
      .form-group {
        position: relative;
        margin-bottom: 24px;
      }

      .input-wrapper {
        position: relative;
        border-radius: 14px;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(124, 58, 237, 0.3),
          rgba(37, 99, 235, 0.1),
          rgba(124, 58, 237, 0.1)
        );
        transition: all 0.4s ease;
      }

      .input-wrapper:focus-within {
        background: linear-gradient(
          135deg,
          rgba(124, 58, 237, 0.6),
          rgba(37, 99, 235, 0.4),
          rgba(6, 182, 212, 0.3)
        );
        box-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
      }

      input {
        width: 100%;
        padding: 16px 20px;
        background: rgba(15, 15, 20, 0.9);
        border: none;
        border-radius: 13px;
        color: #e4e4e7;
        font-size: 15px;
        outline: none;
        font-family: inherit;
        letter-spacing: 0.5px;
      }

      input::placeholder {
        color: rgba(161, 161, 170, 0.4);
      }

      /* Button */
      .btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 1px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #7c3aed, #2563eb);
        color: white;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          transparent 30%,
          rgba(255, 255, 255, 0.1) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.5s ease;
      }

      .btn:hover::after {
        transform: translateX(100%);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* Error */
      .error {
        text-align: center;
        color: #ef4444;
        font-size: 13px;
        min-height: 20px;
        margin-top: 16px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .error.visible {
        opacity: 1;
      }

      /* Shake animation */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        15% {
          transform: translateX(-8px);
        }
        30% {
          transform: translateX(8px);
        }
        45% {
          transform: translateX(-5px);
        }
        60% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-2px);
        }
        90% {
          transform: translateX(2px);
        }
      }

      .shake {
        animation: shake 0.5s ease-in-out;
      }

      /* Success state */
      .card.success {
        border-color: rgba(34, 197, 94, 0.3);
        box-shadow: 0 0 100px rgba(34, 197, 94, 0.1);
      }

      .card.success .btn {
        background: linear-gradient(135deg, #16a34a, #22c55e);
      }

      /* Bottom decoration */
      .bottom-line {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          #7c3aed,
          #2563eb,
          #06b6d4,
          transparent
        );
        opacity: 0.4;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="aurora">
      <div class="aurora-extra"></div>
    </div>
    <div class="grid-overlay"></div>
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div class="card" id="card">
      <div class="logo">
        <div class="logo-text">PIECE</div>
      </div>
      <hr class="logo-rule" />
      <div class="subtitle">Creative Production Platform</div>

      <form id="form" autocomplete="off">
        <div class="form-group">
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Access code"
              autofocus
              autocomplete="off"
            />
          </div>
        </div>
        <button type="submit" class="btn" id="btn">Enter</button>
      </form>

      <div class="error" id="error">Invalid access code</div>
    </div>

    <div class="bottom-line"></div>

    <script>
      (function () {
        const HASH =
          "75198c02dfaf1a394093948cf73e5c193e4bcc81e2eeb905e22330934cc1bff1";
        const TOKEN =
          "c91fec1e133e3b1d40e1e6ca3ec98b10064a9c09a1cf77c7d60515c8d83e1672";

        async function sha256(text) {
          const data = new TextEncoder().encode(text);
          const buf = await crypto.subtle.digest("SHA-256", data);
          return Array.from(new Uint8Array(buf))
            .map((b) => b.toString(16).padStart(2, "0"))
            .join("");
        }

        const form = document.getElementById("form");
        const input = document.getElementById("password");
        const btn = document.getElementById("btn");
        const card = document.getElementById("card");
        const error = document.getElementById("error");

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          btn.disabled = true;
          btn.textContent = "...";
          error.classList.remove("visible");

          const hash = await sha256(input.value);

          if (hash === HASH) {
            card.classList.add("success");
            btn.textContent = "Welcome";
            const d = new Date();
            d.setTime(d.getTime() + 30 * 24 * 60 * 60 * 1000);
            document.cookie =
              "staging_auth=" +
              TOKEN +
              ";expires=" +
              d.toUTCString() +
              ";path=/;Secure;SameSite=Strict";
            setTimeout(function () {
              window.location.href = "/";
            }, 600);
          } else {
            card.classList.add("shake");
            error.classList.add("visible");
            btn.disabled = false;
            btn.textContent = "Enter";
            input.value = "";
            input.focus();
            setTimeout(function () {
              card.classList.remove("shake");
            }, 500);
          }
        });
      })();
    </script>
  </body>
</html>
