# piece — Docker Compose Template
# Replace placeholders: piece, piece, api.localhost, app.localhost
# Port placeholders: 27022, 6384, 9006, 9007, 4223, 8223
# See CLAUDE.md → Port Allocation for the global registry of assigned ports.

x-common-logging: &common-logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

x-common-env: &common-env
  NODE_ENV: ${NODE_ENV:-production}
  MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/?replicaSet=rs0&authSource=admin
  MONGODB_SYSTEM_DB: ${MONGODB_SYSTEM_DB:-system}
  REDIS_URL: redis://redis:6379
  NATS_URL: nats://nats:4222
  API_GATEWAY_URL: http://api-gateway:3100
  JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64}
  JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
  INTERNAL_TOKEN: ${INTERNAL_TOKEN}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  QDRANT_URL: http://qdrant:6333
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9006/piece-uploads}
  IMAGOR_SECRET: ${IMAGOR_SECRET:-imagor-dev-secret-change-me}
  IMAGOR_BASE_URL: ${IMAGOR_BASE_URL:-/img}
  FROM_EMAIL: ${FROM_EMAIL:-noreply@localhost}
  FROM_NAME: ${FROM_NAME:-piece}
  SES_REGION: ${SES_REGION:-eu-central-1}
  SES_ACCESS_KEY_ID: ${SES_ACCESS_KEY_ID:-}
  SES_SECRET_ACCESS_KEY: ${SES_SECRET_ACCESS_KEY:-}
  SES_CONFIGURATION_SET: ${SES_CONFIGURATION_SET:-}

x-common-healthcheck: &common-healthcheck
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 15s

x-infra-depends: &infra-depends
  mongodb:
    condition: service_healthy
  redis:
    condition: service_healthy
  nats:
    condition: service_healthy

services:
  # ============================================================
  # Infrastructure
  # ============================================================

  mongodb:
    image: mongo:7
    restart: unless-stopped
    <<: *common-logging
    command: >
      bash -c "cp /data/keyfile-src /data/keyfile && chmod 400 /data/keyfile && chown mongodb:mongodb /data/keyfile && exec mongod --replSet rs0 --bind_ip_all --keyFile /data/keyfile"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:${MONGO_PORT:-27022}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/keyfile:/data/keyfile-src:ro
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status().ok } catch(e) { db.adminCommand('ping') }"]
      <<: *common-healthcheck

  mongo-init-replica:
    image: mongo:7
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      mongosh --host mongodb:27017
      -u ${MONGO_ROOT_USER:-admin} -p ${MONGO_ROOT_PASSWORD:-changeme}
      --authenticationDatabase admin
      --eval "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] }) }"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *common-logging
    command: redis-server --maxmemory 2gb --maxmemory-policy volatile-lru --appendonly yes --save 900 1 --save 300 10
    ports:
      - "127.0.0.1:${REDIS_PORT:-6384}:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *common-healthcheck

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    <<: *common-logging
    command: >
      -js
      -sd /data
      -m 8222
    ports:
      - "127.0.0.1:${NATS_PORT:-4223}:4222"
      - "127.0.0.1:${NATS_MONITOR_PORT:-8223}:8222"
    volumes:
      - nats_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8222/healthz"]
      <<: *common-healthcheck

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    <<: *common-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9006}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9007}:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      <<: *common-healthcheck

  qdrant:
    image: qdrant/qdrant:v1.14.0
    restart: unless-stopped
    <<: *common-logging
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6337}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6338}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:6333/healthz"]
      <<: *common-healthcheck

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *common-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-piece}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-piece_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-piece}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-piece}"]
      <<: *common-healthcheck

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/piece-uploads &&
      mc mb --ignore-existing local/piece-temp &&
      mc mb --ignore-existing local/piece-exports &&
      mc mb --ignore-existing local/piece-processed &&
      mc ilm rule add local/piece-processed --expire-days 30 &&
      echo 'Buckets created successfully'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  # ============================================================
  # API Gateway
  # ============================================================

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    <<: *common-logging
    environment:
      <<: *common-env
      PORT: 3100
      # Add service URLs here as you add services:
      # USERS_SERVICE_URL: http://users-management:3101
      # TEAMS_SERVICE_URL: http://teams-management:3102
    ports:
      - "127.0.0.1:3100:3100"
    depends_on:
      <<: *infra-depends
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/health"]
      <<: *common-healthcheck

  # ============================================================
  # Backend Services — Add your services below
  # ============================================================

  imagorvideo:
    image: shumc/imagorvideo
    restart: unless-stopped
    <<: *common-logging
    environment:
      IMAGOR_SECRET: ${IMAGOR_SECRET:-imagor-dev-secret-change-me}
      IMAGOR_AUTO_WEBP: 1
      IMAGOR_CACHE_HEADER_TTL: 168h
      IMAGOR_PROCESS_CONCURRENCY: 10
      IMAGOR_REQUEST_TIMEOUT: 15s
      HTTP_LOADER_ALLOWED_SOURCES: ""
      S3_LOADER_BUCKET: piece-uploads
      S3_RESULT_STORAGE_BUCKET: piece-processed
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: 1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      VIPS_CONCURRENCY: 4
      VIPS_MAX_ANIMATION_FRAMES: 60
      VIPS_STRIP_METADATA: 1
      PROMETHEUS_BIND: ":5001"
      PORT: 8000
    depends_on:
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/healthcheck"]
      <<: *common-healthcheck
  #
  # Template for a new service:
  #
  # my-service:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.service
  #     args:
  #       SERVICE_NAME: my-service
  #       PORT: 3101
  #   restart: unless-stopped
  #   environment:
  #     <<: *common-env
  #     PORT: 3101
  #   depends_on:
  #     <<: *infra-depends
  #   healthcheck:
  #     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3101/health"]
  #     <<: *common-healthcheck

  websocket-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: websocket-gateway
        PORT: 3109
    restart: unless-stopped
    <<: *common-logging
    environment:
      <<: *common-env
      PORT: 3109
      WS_CORS_ORIGINS: ${WS_CORS_ORIGINS:-http://localhost:5201}
    depends_on:
      <<: *infra-depends
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3109/health"]
      <<: *common-healthcheck

  # ============================================================
  # Frontend
  # ============================================================

  platform:
    build:
      context: .
      dockerfile: docker/Dockerfile.platform
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
    restart: unless-stopped
    <<: *common-logging
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      <<: *common-healthcheck

  # ============================================================
  # Reverse Proxy
  # ============================================================

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    <<: *common-logging
    entrypoint: ["/docker-entrypoint.sh"]
    environment:
      STAGING_GATE_TOKEN: ${STAGING_GATE_TOKEN:?STAGING_GATE_TOKEN must be set in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./nginx/conf.d/staging-ssl.conf:/etc/nginx/templates/staging-ssl.conf.template:ro
      - ./nginx/gate.html:/usr/share/nginx/html/gate.html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      <<: *common-healthcheck
    depends_on:
      - api-gateway
      - platform

  certbot:
    image: certbot/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 43200 & wait $${!}; done'"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  # ============================================================
  # Monitoring Stack
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    <<: *common-logging
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      <<: *common-healthcheck

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    <<: *common-logging
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_HTTP_PORT: "3001"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3001"
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      <<: *common-healthcheck

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    <<: *common-logging
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      <<: *common-healthcheck

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    <<: *common-logging
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - loki

  node-exporter:
    image: prom/node-exporter:v1.8.0
    restart: unless-stopped
    <<: *common-logging
    pid: host
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mongodb_data:
  redis_data:
  nats_data:
  minio_data:
  qdrant_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
